<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — Météo Express Pro</title>
    <link rel="stylesheet" href="/static/fonts/google-fonts.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="wrap" style="max-width:480px;margin:60px auto;">
    <a href="/" class="logo" style="justify-content:center;margin-bottom:32px;text-decoration:none;">
        <span class="logo-icon">🌤️</span>
        <span>Météo Express <span style="font-size:0.55em;opacity:0.7;">Pro</span></span>
    </a>
    <div class="card" style="padding:36px 32px;">
        <h1 style="font-family:'Outfit',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:6px;text-align:center;">Créer un compte</h1>
        <p style="text-align:center;color:var(--text-muted);font-size:0.9rem;margin-bottom:24px;">
            Optionnel — l'application reste entièrement utilisable sans compte.
        </p>
        {% if error %}
        <div style="background:rgba(242,92,92,0.1);border:1px solid rgba(242,92,92,0.25);border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:0.88rem;color:var(--text);">
            {{ error }}
        </div>
        {% endif %}
        <form method="post" action="/signup">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:0.82rem;font-weight:600;margin-bottom:5px;color:var(--text-muted);">Email</label>
                <input type="email" name="email" required
                       style="width:100%;padding:12px 16px;border:2px solid var(--card-border);border-radius:12px;font-size:0.95rem;background:var(--card);color:var(--text);outline:none;font-family:'Inter',sans-serif;">
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:0.82rem;font-weight:600;margin-bottom:5px;color:var(--text-muted);">Mot de passe</label>
                <input type="password" name="password" required minlength="6"
                       style="width:100%;padding:12px 16px;border:2px solid var(--card-border);border-radius:12px;font-size:0.95rem;background:var(--card);color:var(--text);outline:none;font-family:'Inter',sans-serif;">
            </div>
            <div style="margin-bottom:24px;">
                <label style="display:block;font-size:0.82rem;font-weight:600;margin-bottom:5px;color:var(--text-muted);">Confirmer le mot de passe</label>
                <input type="password" name="confirm_password" required minlength="6"
                       style="width:100%;padding:12px 16px;border:2px solid var(--card-border);border-radius:12px;font-size:0.95rem;background:var(--card);color:var(--text);outline:none;font-family:'Inter',sans-serif;">
            </div>
            <button type="submit" class="search-btn" style="width:100%;justify-content:center;margin-bottom:14px;">
                S'inscrire
            </button>
        </form>
        <p style="text-align:center;font-size:0.88rem;color:var(--text-muted);">
            Déjà un compte ? <a href="/login" style="color:var(--primary);text-decoration:none;font-weight:600;">Se connecter</a>
        </p>
        <p style="text-align:center;margin-top:12px;">
            <a href="/" style="color:var(--text-muted);text-decoration:none;font-size:0.82rem;">← Retour à l'accueil</a>
        </p>
    </div>
</div>
</body>
</html>
