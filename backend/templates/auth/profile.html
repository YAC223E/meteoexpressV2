<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil — Météo Express Pro</title>
    <link rel="stylesheet" href="/static/fonts/google-fonts.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="wrap" style="max-width:520px;margin:40px auto;">
    <a href="/" class="logo" style="justify-content:center;margin-bottom:24px;text-decoration:none;">
        <span class="logo-icon">🌤️</span>
        <span>Météo Express <span style="font-size:0.55em;opacity:0.7;">Pro</span></span>
    </a>

    {% if request.args.get("saved") %}
    <div style="background:rgba(45,212,167,0.1);border:1px solid rgba(45,212,167,0.25);border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:0.88rem;text-align:center;">
        ✅ Profil mis à jour !
    </div>
    {% endif %}
    {% if error %}
    <div style="background:rgba(242,92,92,0.1);border:1px solid rgba(242,92,92,0.25);border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:0.88rem;color:var(--text);">
        {{ error }}
    </div>
    {% endif %}

    <div class="card" style="padding:36px 32px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;">
            <div>
                <h1 style="font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;margin:0;">Mon Profil</h1>
                <p style="color:var(--text-muted);font-size:0.85rem;margin-top:4px;">{{ user.email }}</p>
            </div>
            <a href="/logout" style="background:none;border:1px solid var(--danger);color:var(--danger);border-radius:50px;padding:6px 16px;font-size:0.82rem;text-decoration:none;font-weight:600;">Déconnexion</a>
        </div>

        <form method="post" action="/profile">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:0.82rem;font-weight:600;margin-bottom:5px;color:var(--text-muted);">Âge</label>
                <input type="number" name="age" min="1" max="150" value="{{ profile.age or '' }}"
                       style="width:100%;padding:12px 16px;border:2px solid var(--card-border);border-radius:12px;font-size:0.95rem;background:var(--card);color:var(--text);outline:none;font-family:'Inter',sans-serif;">
            </div>

            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:0.82rem;font-weight:600;margin-bottom:5px;color:var(--text-muted);">Profession</label>
                <select name="occupation"
                        style="width:100%;padding:12px 16px;border:2px solid var(--card-border);border-radius:12px;font-size:0.95rem;background:var(--card);color:var(--text);outline:none;font-family:'Inter',sans-serif;">
                    <option value="" {% if not profile.occupation %}selected{% endif %}>— Sélectionnez —</option>
                    <option value="farmer" {% if profile.occupation == 'farmer' %}selected{% endif %}>👨‍🌾 Agriculteur</option>
                    <option value="outdoor_worker" {% if profile.occupation == 'outdoor_worker' %}selected{% endif %}>👷 Travailleur extérieur</option>
                    <option value="athlete" {% if profile.occupation == 'athlete' %}selected{% endif %}>🏃 Athlète</option>
                    <option value="office_worker" {% if profile.occupation == 'office_worker' %}selected{% endif %}>💼 Employé de bureau</option>
                    <option value="other" {% if profile.occupation == 'other' %}selected{% endif %}>Autre</option>
                </select>
            </div>

            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:0.82rem;font-weight:600;margin-bottom:5px;color:var(--text-muted);">Allergies / Sensibilités</label>
                <input type="text" name="allergies" placeholder="Ex: pollen, acariens" value="{{ profile.allergies or '' }}"
                       style="width:100%;padding:12px 16px;border:2px solid var(--card-border);border-radius:12px;font-size:0.95rem;background:var(--card);color:var(--text);outline:none;font-family:'Inter',sans-serif;">
            </div>

            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:0.82rem;font-weight:600;margin-bottom:5px;color:var(--text-muted);">Conditions chroniques</label>
                <input type="text" name="chronic_conditions" placeholder="Ex: asthme, cardio" value="{{ profile.chronic_conditions or '' }}"
                       style="width:100%;padding:12px 16px;border:2px solid var(--card-border);border-radius:12px;font-size:0.95rem;background:var(--card);color:var(--text);outline:none;font-family:'Inter',sans-serif;">
            </div>

            <div style="margin-bottom:24px;display:flex;align-items:center;gap:10px;">
                <input type="checkbox" name="email_alerts_enabled" value="1" id="alertsCheck"
                       {% if profile.email_alerts_enabled %}checked{% endif %}
                       style="width:18px;height:18px;accent-color:var(--primary);">
                <label for="alertsCheck" style="font-size:0.88rem;color:var(--text);">Recevoir des alertes météo par email</label>
            </div>

            <button type="submit" class="search-btn" style="width:100%;justify-content:center;">
                💾 Enregistrer
            </button>
        </form>

        <p style="text-align:center;margin-top:16px;">
            <a href="/" style="color:var(--text-muted);text-decoration:none;font-size:0.82rem;">← Retour à l'accueil</a>
        </p>
    </div>
</div>
</body>
</html>
